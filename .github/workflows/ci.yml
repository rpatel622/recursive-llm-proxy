name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[proxy,ui,dev]"
      - name: Lint
        run: ruff check src tests examples benchmarks
      - name: Check formatting
        run: black --check src tests examples benchmarks
      - name: Type check
        run: mypy src
      - name: Build wheel and source distribution
        run: python -m build
      - name: Verify source distribution contents
        run: |
          python - <<'PY'
          import glob
          import tarfile

          archive = glob.glob("dist/*.tar.gz")[0]
          with tarfile.open(archive) as source:
              names = source.getnames()
          required = (
              "/CHANGELOG.md",
              "/SECURITY.md",
              "/benchmarks/compare_same_model.py",
              "/examples/demo.py",
          )
          assert all(any(name.endswith(item) for name in names) for item in required)
          PY
      - name: Verify wheel installation
        run: |
          python -m pip uninstall -y recursive-llm
          python -m pip install --no-deps dist/*.whl
          python -c "from importlib.metadata import version; import rlm; assert rlm.__version__ == version('recursive-llm')"

  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
          - os: ubuntu-latest
            python-version: "3.10"
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[proxy,dev]"
      - name: Run test suite
        run: pytest
      - name: Run offline demo
        run: python examples/demo.py
