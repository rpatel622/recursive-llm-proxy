name: RC1 cross-platform install

on:
  pull_request:
    paths:
      - "pyproject.toml"
      - "src/**"
      - ".github/workflows/rc1-cross-platform-install.yml"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - name: Install built wheel with proxy dependencies
        shell: bash
        run: |
          wheel=$(python -c 'import glob; print(glob.glob("dist/*.whl")[0])')
          python -m pip install --force-reinstall "${wheel}[proxy]"
      - name: Verify installed modules and commands outside the checkout
        shell: bash
        run: |
          cd "$RUNNER_TEMP"
          python -c "import rlm_proxy; import rlm_proxy.memory_gateway; import rlm_proxy.control_plane"
          rlm-proxy --help
          rlm-memory --help
          rlm-control --help
