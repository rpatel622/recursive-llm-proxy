name: RC1 system smoke

on:
  pull_request:
    paths:
      - "src/rlm_proxy/**"
      - "tests/test_rc1_system_smoke.py"
      - ".github/workflows/rc1-system-smoke.yml"
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install ".[proxy,dev]"
      - run: pytest -q --no-cov tests/test_rc1_system_smoke.py
