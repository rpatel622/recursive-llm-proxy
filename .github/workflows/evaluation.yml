name: Evaluation baseline

on:
  pull_request:
    paths:
      - "evaluation/**"
      - "tests/test_evaluation_harness.py"
      - "tests/test_evaluation_gates.py"
      - ".github/workflows/evaluation.yml"
  push:
    branches: [main]
    paths:
      - "evaluation/**"
      - "tests/test_evaluation_harness.py"
      - "tests/test_evaluation_gates.py"
      - ".github/workflows/evaluation.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Generate evaluation report
        run: python evaluation/harness.py evaluation/fixtures/smoke-v1.json evaluation/fixtures/smoke-results.json --output evaluation-report.json
      - name: Enforce quality policy
        run: python evaluation/gates.py evaluation-report.json --policy evaluation/policy.json --output evaluation-gate.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evaluation-report
          path: |
            evaluation-report.json
            evaluation-gate.json
