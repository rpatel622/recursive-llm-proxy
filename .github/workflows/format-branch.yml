name: Format CI branch

on:
  push:
    branches:
      - fix/black-formatting

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: fix/black-formatting
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install formatter
        run: python -m pip install -e ".[dev]"
      - name: Apply formatting
        run: black src tests examples benchmarks
      - name: Commit formatting and remove helper
        run: |
          rm .github/workflows/format-branch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply Black formatting"
          git push origin HEAD:fix/black-formatting
